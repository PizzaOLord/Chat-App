<!DOCTYPE html>

<html>
<head>
  <title>Signup</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;

      /* 🖼️ Background Image */
      background: url("/static/bg.jpg") no-repeat center center/cover;
    }

    /* 🔥 Blur overlay */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

      backdrop-filter: blur(12px);
      background: rgba(0, 0, 0, 0.2);

      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;

      width: 320px;
      padding: 30px;
      border-radius: 15px;

      /* ✨ Glass effect */
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(15px);

      box-shadow: 0 0 30px rgba(0,0,0,0.5);
      text-align: center;
      color: white;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      outline: none;

      background: rgba(255,255,255,0.2);
      color: white;
    }

    input::placeholder {
      color: #ddd;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #6c5ce7;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #a29bfe;
    }

    .link {
      margin-top: 10px;
      font-size: 14px;
    }

    .link a {
      color: #a29bfe;
      text-decoration: none;
    }
  </style>

</head>

<body>

  <div class="container">
    <h2>Create Account</h2>


<input id="username" placeholder="Username">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>

<div class="link">
  Already have an account?
  <a href="login.html">Login</a>
</div>


  </div>

  <script>
    async function signup() {
      let res = await fetch("https://chat-backend-k011.onrender.com/signup", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          username: username.value,
          email: email.value,
          password: password.value
        })
      });

      let data = await res.json();

      if (data.token) {
        localStorage.setItem("token", data.token);
        window.location.href = "home.html";
      } else {
        alert(data.msg);
      }
    }
  </script>

</body>
</html>
