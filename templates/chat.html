<!DOCTYPE html>

<html>
<head>
  <title>Chat</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;

      /* ✅ FIXED IMAGE PATH */
      background: url("/static/bg.jpg") no-repeat center center/cover;
    }

    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(12px);
      background: rgba(0, 0, 0, 0.25);
      z-index: 0;
    }

    .chat-container {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    .header {
      color: white;
      font-size: 18px;
      margin-bottom: 10px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .message-wrapper {
      display: flex;
      flex-direction: column;
      margin: 5px 0;
    }

    .username {
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 2px;
      color: white;
    }

    .message {
      padding: 10px;
      border-radius: 12px;
      max-width: 60%;
      word-wrap: break-word;
    }

    .me {
      align-items: flex-end;
    }

    .me .message {
      background: #a29bfe;
      color: black;
    }

    .other {
      align-items: flex-start;
    }

    .other .message {
      background: #dfe6e9;
      color: black;
    }

    .input-area {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.2);
      color: white;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #6c5ce7;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #a29bfe;
    }
  </style>

</head>

<body>

  <div class="chat-container">
    <div class="header">💬 Chat Room</div>

```
<div id="chat"></div>

<div class="input-area">
  <input id="msg" placeholder="Type a message...">
  <button onclick="send()">Send</button>
</div>
```

  </div>

  <!-- Socket -->

  <script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>

  <script>
    let token = localStorage.getItem("token");

    // 🔐 FIXED REDIRECT
    if (!token) {
      window.location.href = "/login-page";
    }

    // decode user
    let payload = JSON.parse(atob(token.split('.')[1]));
    let currentUser = payload.sub;

    // ✅ FIXED SOCKET (IMPORTANT)
    let socket = io();

    socket.on("connect", () => {
      console.log("Connected to server 🔥");
    });

    // RECEIVE MESSAGE
    socket.on("receive_message", function(m) {
      displayMessage(m);
    });

    function send() {
      let input = document.getElementById("msg");

      if (input.value.trim() === "") return;

      socket.emit("send_message", {
        sender: currentUser,
        text: input.value
      });

      input.value = "";
    }

    function displayMessage(m) {
      let chatBox = document.getElementById("chat");

      let wrapper = document.createElement("div");
      wrapper.className = "message-wrapper " +
        (m.sender === currentUser ? "me" : "other");

      let name = document.createElement("div");
      name.className = "username";
      name.textContent = m.sender;

      let message = document.createElement("div");
      message.className = "message";
      message.textContent = m.text;

      wrapper.appendChild(name);
      wrapper.appendChild(message);

      chatBox.appendChild(wrapper);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>

</body>
</html>
