<!DOCTYPE html>

<html>
<head>
  <title>Login</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;

      /* ✅ FIXED IMAGE PATH */
      background: url("/static/bg.jpg") no-repeat center center/cover;
    }

    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;

      backdrop-filter: blur(12px);
      background: rgba(0, 0, 0, 0.2);

      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;

      width: 320px;
      padding: 30px;
      border-radius: 15px;

      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(15px);

      box-shadow: 0 0 30px rgba(0,0,0,0.5);
      text-align: center;
      color: white;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      outline: none;

      background: rgba(255,255,255,0.2);
      color: white;
    }

    input::placeholder {
      color: #ddd;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #6c5ce7;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #a29bfe;
    }

    .link {
      margin-top: 10px;
      font-size: 14px;
    }

    .link a {
      color: #a29bfe;
      text-decoration: none;
    }

    .error {
      color: #ff7675;
      font-size: 14px;
      margin-top: 5px;
    }
  </style>

</head>

<body>

  <div class="container">
    <h2>Welcome Back</h2>


<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="error" id="errorMsg"></div>

<div class="link">
  Don’t have an account?
  <!-- ✅ FIXED LINK -->
  <a href="/">Signup</a>
</div>
```

  </div>

  <script>
    async function login() {
      let emailInput = document.getElementById("email");
      let passInput = document.getElementById("password");
      let errorBox = document.getElementById("errorMsg");

      let res = await fetch("/login", {  // ✅ FIXED URL
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          email: emailInput.value,
          password: passInput.value
        })
      });

      let data = await res.json();

      if (data.token) {
        localStorage.setItem("token", data.token);

        // ✅ FIXED REDIRECT
        window.location.href = "/home";
      } else {
        errorBox.textContent = data.msg;
      }
    }
  </script>

</body>
</html>
