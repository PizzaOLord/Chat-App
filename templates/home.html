<!DOCTYPE html>

<html>
<head>
  <title>Home</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, sans-serif;

      /* ✅ FIXED IMAGE PATH */
      background: url("/static/bg.jpg") no-repeat center center/cover;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;

      backdrop-filter: blur(12px);
      background: rgba(0, 0, 0, 0.25);

      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      color: white;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.8;
    }

    /* 🔥 Floating Button */
    .fab {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);

      width: 70px;
      height: 70px;
      border-radius: 50%;

      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      display: flex;
      justify-content: center;
      align-items: center;

      font-size: 28px;
      color: white;
      cursor: pointer;

      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      transition: 0.3s;
      z-index: 1;
    }

    .fab:hover {
      transform: translateX(-50%) scale(1.1);
    }

  </style>

</head>

<body>

  <div class="content">
    <h1 id="welcomeText">Welcome</h1>
    <p>Yo Gang</p>
  </div>

  <!-- 💬 Floating Button -->

  <div class="fab" onclick="goToChat()">
    💬
  </div>

  <script>
    let token = localStorage.getItem("token");

    // 🔐 FIXED REDIRECT
    if (!token) {
      window.location.href = "/login-page";
    }

    // 🧠 SHOW USERNAME (UPGRADE 🔥)
    let payload = JSON.parse(atob(token.split('.')[1]));
    let username = payload.sub;

    document.getElementById("welcomeText").textContent = "Welcome, " + username;

    function goToChat() {
      // ✅ FIXED ROUTE
      window.location.href = "/chat";
    }
  </script>

</body>
</html>
